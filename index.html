<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Viewer Launcher</title>
    <style>
        /* Color variables for dark and light modes */
        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --container-bg: linear-gradient(180deg, #16161a 0%, #0f0f12 100%);
            --border-color: #232329;
            --shadow: rgba(0, 0, 0, 0.6);
            --btn-bg: linear-gradient(135deg, #0078d4 0%, #00a2ff 100%);
        }

        .light-mode {
            --bg-color: #f4f5f7;
            --text-color: #111111;
            --container-bg: linear-gradient(180deg, #ffffff 0%, #e9ebee 100%);
            --border-color: #ccd0d5;
            --shadow: rgba(0, 0, 0, 0.15);
            --btn-bg: linear-gradient(135deg, #005a9e 0%, #0078d4 100%);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Top Middle Switch Bar */
        .top-bar {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        /* Bigger and better theme button */
        .theme-toggle {
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 6px 15px var(--shadow);
            transition: transform 0.2s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .theme-toggle:hover {
            transform: translateX(0%) scale(1.05);
            border-color: #00a2ff;
        }

        .theme-toggle:active {
            transform: translateX(0%) scale(0.98);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 550px;
            padding: 20px;
            animation: fadeIn 0.6s cubic-bezier(0.1, 1, 0.1, 1) forwards;
            margin-top: 60px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 28px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            padding: 8px 8px 8px 24px;
            box-shadow: 0 12px 35px var(--shadow);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #00a2ff;
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.4);
            transform: scale(1.02);
        }

        input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 1.1rem;
            padding: 12px 0;
        }

        .launch-btn {
            background: var(--btn-bg);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 120, 212, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .launch-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 22px rgba(0, 162, 255, 0.6);
        }

        .launch-btn:active { transform: scale(0.95); }
        .launch-btn svg { width: 22px; height: 22px; fill: none; stroke: #ffffff; stroke-width: 2.5; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="theme-toggle" id="themeToggle">LIGHT THEME</button>
    </div>

    <div class="container">
        <h1>App Launcher</h1>
        <div class="input-wrapper">
            <input type="text" id="urlInput" placeholder="Enter URL or search Google...">
            <button class="launch-btn" id="launchBtn">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const launchBtn = document.getElementById('launchBtn');
        const themeToggle = document.getElementById('themeToggle');

        // Fixed Theme Switcher Logic
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                themeToggle.textContent = 'DARK THEME';
            } else {
                themeToggle.textContent = 'LIGHT THEME';
            }
        });

        // Fixed Smart Launch Logic
        function launch() {
            let input = urlInput.value.trim();
            if (!input) return;
            
            let finalTarget = '';

            // Check if it's a direct website url
            if (input.includes('.') && !input.includes(' ')) {
                if (!/^https?:\/\//i.test(input)) {
                    finalTarget = 'https://' + input;
                } else {
                    finalTarget = input;
                }
            } else {
                // Otherwise treat it as a Google Search
                finalTarget = 'https://www.google.com/search?q=' + encodeURIComponent(input);
            }
            
            window.open(finalTarget, '_blank', 'popup=yes,width=1200,height=800');
        }

        launchBtn.addEventListener('click', launch);
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') launch(); });
    </script>
</body>
</html>
