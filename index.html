<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Viewer Launcher</title>
    <style>
        /* Color variables for smooth switching */
        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --container-bg: linear-gradient(180deg, #16161a 0%, #0f0f12 100%);
            --border-color: #232329;
            --input-bg: #1c1c24;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        .light-mode {
            --bg-color: #f0f2f5;
            --text-color: #1a1a1a;
            --container-bg: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
            --border-color: #dddddd;
            --input-bg: #eaeaea;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Cool Top Bar for Theme Switcher */
        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .theme-toggle {
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px var(--shadow);
        }
        .theme-toggle:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            animation: fadeIn 0.6s cubic-bezier(0.1, 1, 0.1, 1) forwards;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 24px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            padding: 6px 6px 6px 20px;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .input-wrapper:focus-within {
            border-color: #00a2ff;
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.3);
            transform: scale(1.02);
        }

        input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 1rem;
            padding: 10px 0;
        }

        .launch-btn {
            background: linear-gradient(135deg, #0078d4 0%, #00a2ff 100%);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.4);
        }

        .launch-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 162, 255, 0.6);
            filter: brightness(1.1);
        }

        .launch-btn:active { transform: scale(0.95); }
        .launch-btn svg { width: 20px; height: 20px; fill: none; stroke: #ffffff; stroke-width: 2.5; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="theme-toggle" id="themeToggle">☀️ Light Mode</button>
    </div>

    <div class="container">
        <h1>App Launcher</h1>
        <div class="input-wrapper">
            <input type="text" id="urlInput" placeholder="Enter URL or search Google...">
            <button class="launch-btn" id="launchBtn">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const launchBtn = document.getElementById('launchBtn');
        const themeToggle = document.getElementById('themeToggle');

        // Theme Switcher Logic
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                themeToggle.textContent = '🌙 Dark Mode';
            } else {
                themeToggle.textContent = '☀️ Light Mode';
            }
        });

        // Smart Launch Logic (URL vs Google Search)
        function launch() {
            let input = urlInput.value.trim();
            if (!input) return;
            
            let finalTarget = '';

            // Check if it looks like a website (has a dot and no spaces)
            if (input.includes('.') && !input.includes(' ')) {
                if (!/^https?:\/\//i.test(input)) {
                    finalTarget = 'https://' + input;
                } else {
                    finalTarget = input;
                }
            } else {
                // If it's just words, send it to Google Search
                finalTarget = 'https://www.google.com/search?q=' + encodeURIComponent(input);
            }
