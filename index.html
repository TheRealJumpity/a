<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .navbar {
            display: flex;
            align-items: center;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333333;
            padding: 10px;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            background-color: #252525;
            border: 1px solid #444444;
            border-radius: 4px;
            color: #ffffff;
            font-size: 0.9rem;
            padding: 8px 12px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #0078d4; }
        .launch-btn {
            background-color: #0078d4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .launch-btn:hover { background-color: #005a9e; }
        .viewer-frame {
            flex: 1;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g., wikipedia.org)">
        <button class="launch-btn" id="launchBtn">Go</button>
    </div>

    <iframe class="viewer-frame" id="webViewer" src="about:blank"></iframe>

    <script>
        const urlInput = document.getElementById('urlInput');
        const launchBtn = document.getElementById('launchBtn');
        const webViewer = document.getElementById('webViewer');

        function launch() {
            let input = urlInput.value.trim();
            if (!input) return;
            
            // Automatically add https:// if the user didn't type it
            if (!/^https?:\/\//i.test(input)) {
                input = 'https://' + input;
            }
            
            // Set the iframe source to the new URL
            webViewer.src = input;
        }

        launchBtn.addEventListener('click', launch);
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') launch(); });
    </script>
</body>
</html>
