<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Popup Launcher</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 18px 28px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #22c55e;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #16a34a;
    }
  </style>
</head>

<body>

  <button onclick="openWindow()">Open in New Window</button>

  <script>
    function openWindow() {
      const url = window.location.href;

      const newWin = window.open(
        url,
        "_blank",
        "width=1000,height=700,left=200,top=100,resizable=yes,scrollbars=yes"
      );

      if (!newWin) {
        alert("Popup blocked. Allow popups for this site.");
      } else {
        newWin.focus();
      }
    }
  </script>

</body>
</html>
